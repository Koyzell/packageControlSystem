<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员工作台 - 驿站包裹管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Header -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-shop me-2"></i>驿站包裹管理系统 - 管理员工作台
            </span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="navUser"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="max-width: 1400px;">
        <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

        <!-- Dashboard -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-primary bg-opacity-10 stat-card">
                    <div class="card-body text-center py-3">
                        <h4 class="fw-bold text-primary mb-0" id="statTodayCheckIn">-</h4>
                        <small class="text-muted">今日入库</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-success bg-opacity-10 stat-card">
                    <div class="card-body text-center py-3">
                        <h4 class="fw-bold text-success mb-0" id="statTodayPickup">-</h4>
                        <small class="text-muted">今日取件</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-danger bg-opacity-10 stat-card">
                    <div class="card-body text-center py-3">
                        <h4 class="fw-bold text-danger mb-0" id="statOverdue">-</h4>
                        <small class="text-muted">当前滞留</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-warning bg-opacity-10 stat-card">
                    <div class="card-body text-center py-3">
                        <h4 class="fw-bold text-warning mb-0" id="statAwaiting">-</h4>
                        <small class="text-muted">待取总数</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Check-In Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold">
                <i class="bi bi-plus-circle me-2 text-primary"></i>包裹入库
            </div>
            <div class="card-body">
                <form id="checkInForm" novalidate>
                    <div class="row g-3">
                        <div class="col-12 col-md-2">
                            <label class="form-label">运单号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="trackingNumber" placeholder="请输入运单号" required>
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">收件人手机号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="recipientPhone" placeholder="请输入手机号" required>
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">快递公司 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <select class="form-select" id="courierCompany" required></select>
                                <button type="button" class="btn btn-outline-secondary" title="新增快递公司"
                                        onclick="showAddDialog('courier')">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">货架位置 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <select class="form-select" id="shelfLocation" required></select>
                                <button type="button" class="btn btn-outline-secondary" title="新增货架"
                                        onclick="showAddDialog('shelf')">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-12 col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-check-lg me-1"></i>确认入库
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Package List Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <div class="row g-2 align-items-center">
                    <div class="col-md-auto">
                        <span class="fw-bold"><i class="bi bi-list-ul me-2 text-primary"></i>包裹列表</span>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="searchKeyword" placeholder="搜索运单号/取件码...">
                            <button class="btn btn-outline-primary" onclick="searchPackages()">搜索</button>
                        </div>
                    </div>
                    <div class="col-md-auto ms-auto">
                        <div class="btn-group btn-group-sm" id="filterTabs">
                            <button type="button" class="btn btn-outline-primary active" data-filter="all">全部</button>
                            <button type="button" class="btn btn-outline-primary" data-filter="AWAITING_PICKUP">待取件</button>
                            <button type="button" class="btn btn-outline-primary" data-filter="PICKED_UP">已取件</button>
                            <button type="button" class="btn btn-outline-danger" data-filter="overdue">
                                <i class="bi bi-exclamation-triangle me-1"></i>逾期滞留
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0 fixed-table">
                        <colgroup>
                            <col style="width:13%"><col style="width:13%"><col style="width:12%">
                            <col style="width:10%"><col style="width:9%"><col style="width:8%">
                            <col style="width:13%"><col style="width:13%"><col style="width:9%">
                        </colgroup>
                        <thead class="table-light">
                            <tr>
                                <th>运单号</th><th>取件码</th><th>手机号</th>
                                <th>快递公司</th><th>货架位置</th><th>状态</th>
                                <th>入库时间</th><th>出库时间</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="packageTableBody">
                            <tr><td colspan="9" class="text-center text-muted py-4">
                                <i class="bi bi-inbox display-4 d-block mb-2"></i>暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white" id="paginationContainer" style="display:none;">
                <nav>
                    <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Add Dialog Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="addModalTitle">新增</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="addItemName" placeholder="请输入名称" maxlength="16">
                    <div class="invalid-feedback" id="addItemError"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary btn-sm" id="addItemConfirm">确认添加</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TOKEN = localStorage.getItem('token');
        const ROLE = localStorage.getItem('role');
        if (!TOKEN || ROLE !== 'ADMIN' || isTokenExpired(TOKEN)) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        function isTokenExpired(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.exp * 1000 < Date.now();
            } catch (e) { return true; }
        }
        document.getElementById('navUser').textContent = localStorage.getItem('username');

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        async function authFetch(url, options) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + TOKEN;
            const res = await fetch(url, options);
            if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; throw new Error('未登录'); }
            if (res.status === 403) { const b = await res.clone().json(); throw new Error(b.message || '无权限'); }
            return res;
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();
            const bgClass = type === 'error' ? 'bg-danger' : 'bg-success';
            const icon = type === 'error' ? 'bi-x-circle' : 'bi-check-circle';
            container.insertAdjacentHTML('beforeend', `<div id="${toastId}" class="toast align-items-center text-white ${bgClass} border-0" role="alert">
                <div class="d-flex"><div class="toast-body"><i class="bi ${icon} me-2"></i>${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
            const el = document.getElementById(toastId);
            const toast = new bootstrap.Toast(el, { delay: 3000 });
            toast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }

        // ===== Dashboard =====
        async function loadDashboard() {
            try {
                const res = await authFetch('/api/admin/dashboard');
                const r = await res.json();
                if (r.code === 200) {
                    document.getElementById('statTodayCheckIn').textContent = r.data.todayCheckIn;
                    document.getElementById('statTodayPickup').textContent = r.data.todayPickup;
                    document.getElementById('statOverdue').textContent = r.data.overdueCount;
                    document.getElementById('statAwaiting').textContent = r.data.awaitingCount;
                }
            } catch (err) {}
        }

        // ===== Dynamic Dropdowns =====
        let addModalType = '';

        async function loadDropdowns() {
            try {
                const [sRes, cRes] = await Promise.all([
                    authFetch('/api/admin/shelves'),
                    authFetch('/api/admin/couriers')
                ]);
                const shelves = await sRes.json();
                const couriers = await cRes.json();
                if (shelves.code === 200) {
                    document.getElementById('shelfLocation').innerHTML =
                        '<option value="">请选择货架</option>' +
                        shelves.data.map(s => `<option value="${s}">${s}</option>`).join('');
                }
                if (couriers.code === 200) {
                    document.getElementById('courierCompany').innerHTML =
                        '<option value="">请选择快递公司</option>' +
                        couriers.data.map(c => `<option value="${c}">${c}</option>`).join('');
                }
            } catch (err) {}
        }

        function showAddDialog(type) {
            addModalType = type;
            const title = type === 'shelf' ? '新增货架' : '新增快递公司';
            document.getElementById('addModalTitle').textContent = title;
            document.getElementById('addItemName').value = '';
            document.getElementById('addItemName').maxLength = type === 'shelf' ? 10 : 16;
            document.getElementById('addItemName').placeholder =
                type === 'shelf' ? '货架名称（最多10字）' : '快递公司名称（最多16字）';
            document.getElementById('addItemError').style.display = 'none';
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        document.getElementById('addItemConfirm').addEventListener('click', async function() {
            const name = document.getElementById('addItemName').value.trim();
            const errEl = document.getElementById('addItemError');
            const maxLen = addModalType === 'shelf' ? 10 : 16;
            if (!name) { errEl.textContent = '名称不能为空'; errEl.style.display = 'block'; return; }
            if (name.length > maxLen) { errEl.textContent = '名称不能超过' + maxLen + '个字符'; errEl.style.display = 'block'; return; }
            try {
                const res = await authFetch('/api/admin/' + (addModalType === 'shelf' ? 'shelves' : 'couriers'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(name)
                });
                const r = await res.json();
                if (r.code === 200) {
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    showToast(addModalType === 'shelf' ? '货架添加成功' : '快递公司添加成功', 'success');
                    await loadDropdowns();
                    // Select the newly added item
                    const sel = document.getElementById(addModalType === 'shelf' ? 'shelfLocation' : 'courierCompany');
                    sel.value = name;
                } else {
                    errEl.textContent = r.message;
                    errEl.style.display = 'block';
                }
            } catch (err) { showToast('网络错误: ' + err.message, 'error'); }
        });

        // ===== Packages =====
        let currentPage = parseInt(sessionStorage.getItem('pkgPage')) || 1;
        let currentFilter = sessionStorage.getItem('pkgFilter') || 'all';
        let savedKeyword = sessionStorage.getItem('pkgKeyword') || '';

        async function loadPackages(filter, page) {
            filter = filter || currentFilter;
            page = page || 1;
            currentFilter = filter;
            currentPage = page;
            sessionStorage.setItem('pkgFilter', filter);
            sessionStorage.setItem('pkgPage', page);
            try {
                let url;
                if (filter === 'overdue') {
                    url = '/api/admin/packages/overdue';
                    const res = await authFetch(url);
                    const r = await res.json();
                    if (r.code === 200) renderTable(r.data);
                } else {
                    url = `/api/admin/packages?page=${page}&pageSize=20`;
                    if (filter && filter !== 'all') url += '&status=' + filter;
                    const kw = document.getElementById('searchKeyword').value.trim();
                    if (kw) url += '&keyword=' + encodeURIComponent(kw);
                    sessionStorage.setItem('pkgKeyword', kw);
                    const res = await authFetch(url);
                    const r = await res.json();
                    if (r.code === 200) { renderTable(r.data.list); renderPagination(r.data); }
                }
            } catch (err) { showToast('网络错误: ' + err.message, 'error'); }
        }

        function renderTable(packages) {
            const tbody = document.getElementById('packageTableBody');
            if (!packages || packages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
                    <i class="bi bi-inbox display-4 d-block mb-2"></i>暂无数据</td></tr>`;
                return;
            }
            tbody.innerHTML = packages.map(p => {
                let statusHtml, rowClass = '';
                if (p.overdue) { statusHtml = '<span class="badge bg-danger">滞留</span>'; rowClass = 'overdue-row'; }
                else if (p.status === 'AWAITING_PICKUP') statusHtml = '<span class="badge bg-warning text-dark">待取件</span>';
                else statusHtml = '<span class="badge bg-success">已取件</span>';

                const btn = p.status === 'AWAITING_PICKUP'
                    ? `<button class="btn btn-sm btn-success" onclick="confirmPickup(${p.id})"><i class="bi bi-check-lg"></i> 取件</button>`
                    : '<span class="text-muted no-action">-</span>';

                return `<tr class="${rowClass}">
                    <td>${esc(p.trackingNumber)}</td>
                    <td><code class="pickup-code">${esc(p.pickupCode || '-')}</code></td>
                    <td>${esc(p.recipientPhone)}</td>
                    <td>${esc(p.courierCompany)}</td>
                    <td><code>${esc(p.shelfLocation)}</code></td>
                    <td>${statusHtml}</td>
                    <td>${p.checkInTime || ''}</td>
                    <td>${p.checkOutTime || '-'}</td>
                    <td>${btn}</td></tr>`;
            }).join('');
        }

        function renderPagination(r) {
            const c = document.getElementById('paginationContainer');
            const ul = document.getElementById('pagination');
            if (r.totalPages <= 1) { c.style.display = 'none'; return; }
            c.style.display = '';
            let h = `<li class="page-item ${r.page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${r.page - 1})">上一页</a></li>`;
            for (let i = 1; i <= r.totalPages; i++)
                h += `<li class="page-item ${i === r.page ? 'active' : ''}"><a class="page-link" href="#" onclick="goToPage(${i})">${i}</a></li>`;
            h += `<li class="page-item ${r.page >= r.totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${r.page + 1})">下一页</a></li>`;
            h += `<li class="page-item disabled"><span class="page-link">共 ${r.total} 条</span></li>`;
            ul.innerHTML = h;
        }

        function goToPage(p) { if (p >= 1) loadPackages(currentFilter, p); }
        function searchPackages() { loadPackages('all', 1); }
        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ===== Check-In =====
        document.getElementById('checkInForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                trackingNumber: document.getElementById('trackingNumber').value.trim(),
                recipientPhone: document.getElementById('recipientPhone').value.trim(),
                courierCompany: document.getElementById('courierCompany').value,
                shelfLocation: document.getElementById('shelfLocation').value
            };
            if (!data.trackingNumber || !data.recipientPhone || !data.courierCompany || !data.shelfLocation) {
                showToast('请填写所有必填字段', 'error'); return;
            }
            try {
                const res = await authFetch('/api/admin/packages/check-in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const r = await res.json();
                if (r.code === 200) {
                    showToast('入库成功，取件码: ' + r.data.pickupCode, 'success');
                    document.getElementById('checkInForm').reset();
                    loadDashboard();
                    loadPackages(currentFilter, currentPage);
                } else showToast(r.message, 'error');
            } catch (err) { showToast('网络错误: ' + err.message, 'error'); }
        });

        // ===== Pickup =====
        async function confirmPickup(id) {
            if (!confirm('确认该包裹已被收件人取走？')) return;
            try {
                const res = await authFetch('/api/admin/packages/' + id + '/pickup', { method: 'PUT' });
                const r = await res.json();
                if (r.code === 200) { showToast('取件成功', 'success'); loadDashboard(); loadPackages(currentFilter, currentPage); }
                else showToast(r.message, 'error');
            } catch (err) { showToast('网络错误: ' + err.message, 'error'); }
        }

        // ===== Filters =====
        document.getElementById('filterTabs').addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') return;
            this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('searchKeyword').value = '';
            loadPackages(e.target.dataset.filter, 1);
        });

        // ===== Init =====
        loadDropdowns();
        loadDashboard();
        document.getElementById('searchKeyword').value = savedKeyword;

        // Restore active filter tab
        if (currentFilter !== 'all') {
            document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`#filterTabs button[data-filter="${currentFilter}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }
        loadPackages(currentFilter, currentPage);
    </script>
</body>
</html>
