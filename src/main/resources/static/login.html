<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 驿站包裹管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="login-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-seam display-3 text-primary"></i>
                        <h3 class="fw-bold mt-2">驿站包裹管理系统</h3>
                        <p class="text-muted">请登录以继续</p>
                    </div>
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <div id="loginError" class="alert alert-danger d-none"></div>
                            <form id="loginForm" novalidate>
                                <div class="mb-3">
                                    <label class="form-label">用户名</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" id="username"
                                               placeholder="请输入用户名" required autofocus>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">密码</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" class="form-control" id="password"
                                               placeholder="请输入密码" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>登录
                                </button>
                            </form>
                        </div>
                        <div class="card-footer bg-white text-center text-muted small">
                            测试账号：admin / admin123 &nbsp;|&nbsp; user / user123
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('loginError');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>登录中...';
            errDiv.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const result = await res.json();
                if (result.code === 200) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('username', result.data.username);
                    localStorage.setItem('role', result.data.role);
                    sessionStorage.setItem('token', result.data.token);
                    sessionStorage.setItem('username', result.data.username);
                    sessionStorage.setItem('role', result.data.role);
                    if (result.data.role === 'ADMIN') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'user.html';
                    }
                } else {
                    errDiv.textContent = result.message;
                    errDiv.classList.remove('d-none');
                }
            } catch (err) {
                errDiv.textContent = '网络错误: ' + err.message;
                errDiv.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>登录';
            }
        });
    </script>
</body>
</html>
