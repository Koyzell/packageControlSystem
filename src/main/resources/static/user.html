<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户取件 - 驿站包裹管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Header -->
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-box-seam me-2"></i>驿站包裹管理系统 - 用户取件
            </span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="navUser"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">

        <!-- Toast Container -->
        <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

        <!-- Search Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold">
                <i class="bi bi-search me-2 text-success"></i>查询包裹
            </div>
            <div class="card-body">
                <form id="searchForm" novalidate>
                    <div class="row g-3 align-items-end">
                        <div class="col-12 col-sm-8">
                            <label class="form-label">请输入手机号、取件码或运单号</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control" id="keywordInput"
                                       placeholder="手机号 / 取件码 / 运单号" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-4">
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="bi bi-search me-1"></i>查询
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Card -->
        <div class="card shadow-sm" id="resultsCard" style="display: none;">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-bold"><i class="bi bi-list-check me-2 text-success"></i>查询结果</span>
                <span class="badge bg-primary" id="resultCount"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0 user-table">
                        <thead class="table-light">
                            <tr>
                                <th>运单号</th>
                                <th>取件码</th>
                                <th>快递公司</th>
                                <th>货架位置</th>
                                <th>入库时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="packageTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="text-center py-5 d-none" id="emptyState">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <p class="text-muted mt-3 fs-5">请输入信息查询包裹</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== JWT Guard =====
        const TOKEN = localStorage.getItem('token');
        if (!TOKEN || isTokenExpired(TOKEN)) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        function isTokenExpired(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.exp * 1000 < Date.now();
            } catch (e) { return true; }
        }
        document.getElementById('navUser').textContent = localStorage.getItem('username');

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ===== authFetch =====
        async function authFetch(url, options) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + TOKEN;
            const res = await fetch(url, options);
            if (res.status === 401) {
                localStorage.clear();
                window.location.href = 'login.html';
                throw new Error('未登录');
            }
            if (res.status === 403) {
                const b = await res.clone().json();
                throw new Error(b.message || '无权限');
            }
            return res;
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();
            const bgClass = type === 'error' ? 'bg-danger' : 'bg-success';
            const icon = type === 'error' ? 'bi-x-circle' : 'bi-check-circle';
            const html = `
                <div id="${toastId}" class="toast align-items-center text-white ${bgClass} border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body"><i class="bi ${icon} me-2"></i>${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            const toastEl = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }

        async function searchPackages(keyword) {
            try {
                const res = await authFetch('/api/user/packages?keyword=' + encodeURIComponent(keyword));
                const result = await res.json();
                const resultsCard = document.getElementById('resultsCard');
                const emptyState = document.getElementById('emptyState');

                if (result.code === 200) {
                    if (result.data && result.data.length > 0) {
                        resultsCard.style.display = '';
                        emptyState.classList.add('d-none');
                        document.getElementById('resultCount').textContent = '共 ' + result.data.length + ' 个待取包裹';
                        renderTable(result.data);
                    } else {
                        resultsCard.style.display = 'none';
                        emptyState.classList.remove('d-none');
                        emptyState.innerHTML = `
                            <i class="bi bi-emoji-smile display-1 text-success"></i>
                            <p class="text-muted mt-3 fs-5">该信息下暂无待取包裹</p>`;
                    }
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                showToast('网络错误: ' + err.message, 'error');
            }
        }

        function renderTable(packages) {
            const tbody = document.getElementById('packageTableBody');
            tbody.innerHTML = packages.map(p => {
                let statusHtml, rowClass = '';
                if (p.overdue) {
                    statusHtml = '<span class="badge bg-danger">已滞留</span>';
                    rowClass = 'overdue-row';
                } else {
                    statusHtml = '<span class="badge bg-warning text-dark">待取件</span>';
                }

                return `<tr class="${rowClass}">
                    <td>${escapeHtml(p.trackingNumber)}</td>
                    <td><code class="pickup-code">${escapeHtml(p.pickupCode || '-')}</code></td>
                    <td>${escapeHtml(p.courierCompany)}</td>
                    <td><code>${escapeHtml(p.shelfLocation)}</code></td>
                    <td>${p.checkInTime || ''}</td>
                    <td>${statusHtml}</td>
                    <td>
                        <button class="btn btn-success btn-sm" onclick="confirmPickup(${p.id}, '${escapeHtml(p.pickupCode || p.trackingNumber)}')">
                            <i class="bi bi-check-lg"></i> 确认取件
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function confirmPickup(id, code) {
            if (!confirm('确认取走包裹 ' + code + '？\n取件后无法撤销。')) return;
            try {
                const res = await authFetch('/api/user/packages/' + id + '/pickup', { method: 'PUT' });
                const result = await res.json();
                if (result.code === 200) {
                    showToast(code + ' 取件成功', 'success');
                    const keyword = document.getElementById('keywordInput').value.trim();
                    if (keyword) searchPackages(keyword);
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                showToast('网络错误: ' + err.message, 'error');
            }
        }

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const keyword = document.getElementById('keywordInput').value.trim();
            if (!keyword) {
                showToast('请输入手机号、取件码或运单号', 'error');
                return;
            }
            searchPackages(keyword);
        });
    </script>
</body>
</html>
